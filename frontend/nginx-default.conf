# SnapLearn AI Frontend - Default Server Configuration

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Enable gzip compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 9;
    etag on;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
        
        # CORS for fonts and assets
        add_header Access-Control-Allow-Origin *;
    }

    # Cache HTML with shorter expiration
    location ~* \.(html)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header X-Content-Type-Options nosniff;
    }

    # API proxy (if needed for development)
    location /api/ {
        # For production, API should be accessed directly
        # This is mainly for development scenarios
        return 404;
    }

    # Health check endpoint
    location /health.html {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Main application - React Router support
    location / {
        try_files $uri $uri/ /index.html;
        
        # Security headers for HTML
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # No cache for main HTML to ensure updates
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Handle favicon.ico
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Handle robots.txt
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # Handle manifest.json
    location = /manifest.json {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Security: Hide dot files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Security: Prevent access to sensitive files
    location ~* \.(conf|log|sql|bak|backup|old)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Rate limiting for specific paths
    location /demo {
        limit_req zone=api burst=5 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}